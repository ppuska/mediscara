mongo:
    image: mongo:4.4
    command: --nojournal
    
orion:
    image: fiware/orion
    links:
      - mongo
    ports:
      - "1026:1026"
    command: -dbhost mongo
    
crate-db:
    image: crate:4.6.6
    hostname: crate-db
    ports:
        - "4200:4200"
        - "4300:4300"
        - "5432:5432"
#    command:
#        -Ccluster.name=democluster -Chttp.cors.enabled=true
#        -Chttp.cors.allow-origin="*"

quantum-leap:
    image: smartsdk/quantumleap
    hostname: quantum-leap
    ports:
        - "8668:8668"
    links:
        - crate-db
    environment:
        - CRATE_HOST=crate-db

grafana:
    image: grafana/grafana
    links:
        - crate-db
    ports:
        - "3003:3000"
    environment:
        - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-worldmap-panel
